<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Quiz Game</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- ========== ADMIN LOGIN ========== -->
  <div id="loginScreen" class="screen-flex active">
    <div class="join-screen kahoot-bg">
      <div class="join-box">
        <h2>Admin Login</h2>
        <p style="color:#666;font-size:0.9rem;margin-bottom:1rem;">Nhập mật khẩu để điều khiển cuộc thi</p>
        <input type="password" id="adminPassword" class="join-input" placeholder="Mật khẩu admin" autocomplete="off">
        <button class="join-btn" onclick="adminLogin()">Đăng nhập</button>
        <div id="loginError" style="color:#E21B3C;font-weight:700;margin-top:0.8rem;display:none;"></div>
      </div>
    </div>
  </div>

  <!-- ========== LOBBY / STANDBY ========== -->
  <div id="lobbyScreen" class="screen active">
    <div class="lobby-screen kahoot-bg">
      <div class="lobby-title">Cuộc thi kiến thức</div>
      <div class="lobby-pin-box">
        <div class="lobby-pin" id="lobbyPin">QUIZ GAME</div>
        <div class="lobby-pin-sub">Truy cập /player để tham gia</div>
        <div id="lobbyQR" style="margin-top:12px;"></div>
      </div>
      <div class="player-count-big" id="playerCountBig">0</div>
      <div class="player-count-label">Thí sinh đã tham gia</div>
      <div class="players-cloud" id="playersCloud"></div>
      <button class="btn btn-white btn-large" onclick="startGame()" id="btnStart">Bắt đầu</button>
    </div>
  </div>

  <!-- ========== QUESTION DISPLAY ========== -->
  <div id="questionScreen" class="screen">
    <div class="question-screen-admin">
      <div class="question-top-bar">
        <div class="question-counter" id="qCounter">Câu 1 / 20</div>
        <div class="answers-counter" id="answersCounter">0 / 0 đã trả lời</div>
      </div>
      <div class="question-center">
        <div class="question-timer-big" id="timerBig">15</div>
        <div class="question-text-display" id="qTextDisplay"></div>
      </div>
      <div class="answers-grid" id="answersGrid"></div>
      <div class="admin-bottom-bar">
        <button class="btn btn-danger" onclick="endQuestion()">Kết thúc câu hỏi</button>
        <button class="btn btn-secondary" onclick="toggleMonitor()">Theo dõi</button>
      </div>
      <!-- Player Monitor Panel -->
      <div id="monitorPanel" class="monitor-panel" style="display:none;">
        <div class="monitor-header">
          <span>Theo dõi thí sinh</span>
          <button onclick="toggleMonitor()" style="background:none;border:none;color:white;font-size:1.2rem;cursor:pointer;">&times;</button>
        </div>
        <div id="monitorList" class="monitor-list"></div>
      </div>
    </div>
  </div>

  <!-- ========== RESULT ========== -->
  <div id="resultScreen" class="screen">
    <div class="result-screen-admin">
      <div class="result-question-bar" id="resultQuestionBar">Câu 1 / 20</div>
      <div class="result-body">
        <div class="result-correct-text" id="resultCorrectText"></div>
        <div class="result-bars-container" id="resultBars"></div>
        <div class="result-stats" id="resultStats"></div>
        <div class="result-controls">
          <button class="btn btn-primary" onclick="showRanking()">Bảng xếp hạng</button>
          <button class="btn btn-success" onclick="nextQuestion()" id="btnNext">Câu tiếp theo</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== RANKING ========== -->
  <div id="rankingScreen" class="screen">
    <div class="ranking-screen">
      <div class="ranking-header">
        <div class="ranking-title" id="rankingTitle">Bảng xếp hạng</div>
        <div class="ranking-sub" id="rankingSub"></div>
      </div>
      <div class="podium" id="podium"></div>
      <div class="ranking-list" id="rankingList"></div>
      <div class="admin-bottom-bar">
        <button class="btn btn-success" onclick="nextQuestion()" id="btnNextRank">Câu tiếp theo</button>
      </div>
    </div>
  </div>

  <!-- ========== OBSTACLE ========== -->
  <div id="obstacleScreen" class="screen">
    <div class="question-screen-admin">
      <div class="question-top-bar">
        <div class="question-counter">Chướng ngại vật</div>
        <div class="answers-counter" id="obstacleAnswerCount">0 / 0 đã trả lời</div>
      </div>
      <div class="question-center">
        <div class="question-timer-big" id="obstacleTimer">30</div>
        <div class="question-text-display" id="obstacleQuestion"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:1rem 0;" id="obstacleHints"></div>
        <div style="display:flex;gap:8px;justify-content:center;margin:1rem 0;font-size:2rem;letter-spacing:8px;" id="obstacleBlanks"></div>
        <div style="font-size:1rem;color:rgba(255,255,255,0.6);font-weight:700;" id="obstaclePoints"></div>
      </div>
      <div class="admin-bottom-bar">
        <button class="btn btn-danger" onclick="endObstacle()">Kết thúc</button>
      </div>
    </div>
  </div>

  <!-- ========== FINAL ========== -->
  <div id="finalScreen" class="screen">
    <div class="ranking-screen">
      <div class="ranking-header">
        <div class="final-crown">👑</div>
        <div class="ranking-title">Kết quả cuộc thi</div>
      </div>
      <div class="podium" id="finalPodium"></div>
      <div class="ranking-list" id="finalRankingList"></div>
      <div class="admin-bottom-bar">
        <button class="btn btn-danger" onclick="resetGame()">Chơi lại</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
