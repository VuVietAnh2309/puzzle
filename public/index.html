<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Game - Chương trình Thi đấu</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background: #0a0a1a;
      color: white;
    }

    /* ==================== ANIMATED BACKGROUND ==================== */
    .bg-scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(135deg, #1a0533 0%, #0d1b3e 30%, #16082e 60%, #0a1628 100%);
      overflow: hidden;
    }

    /* Animated gradient orbs */
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: orbFloat 12s ease-in-out infinite;
      opacity: 0.5;
    }

    .bg-orb:nth-child(1) {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.5), transparent 70%);
      top: -15%; right: -10%;
      animation-duration: 15s;
    }

    .bg-orb:nth-child(2) {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.4), transparent 70%);
      bottom: -10%; left: -5%;
      animation-duration: 18s;
      animation-delay: -5s;
    }

    .bg-orb:nth-child(3) {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(236, 72, 153, 0.35), transparent 70%);
      top: 40%; left: 50%;
      transform: translateX(-50%);
      animation-duration: 20s;
      animation-delay: -8s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -40px) scale(1.1); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(15px, 30px) scale(1.05); }
    }

    /* Floating particles */
    .particles {
      position: absolute;
      inset: 0;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      animation: particleFloat linear infinite;
    }

    @keyframes particleFloat {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* Horizontal light sweep */
    .light-sweep {
      position: absolute;
      width: 200%;
      height: 1px;
      top: 30%;
      left: -50%;
      background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.3), rgba(59, 130, 246, 0.5), rgba(139, 92, 246, 0.3), transparent);
      animation: sweep 8s ease-in-out infinite;
      opacity: 0.6;
    }

    .light-sweep:nth-child(5) {
      top: 65%;
      animation-delay: -4s;
      animation-duration: 10s;
    }

    @keyframes sweep {
      0%, 100% { transform: translateX(-30%); }
      50% { transform: translateX(30%); }
    }

    /* ==================== MAIN LAYOUT ==================== */
    .main-container {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    /* ==================== GLASS CARD ==================== */
    .glass-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      position: relative;
      overflow: hidden;
      animation: cardAppear 1s ease-out;
    }

    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Glow border effect */
    .glass-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 24px;
      padding: 1px;
      background: linear-gradient(
        135deg,
        rgba(139, 92, 246, 0.4),
        rgba(59, 130, 246, 0.1),
        transparent,
        rgba(236, 72, 153, 0.15),
        rgba(139, 92, 246, 0.3)
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      animation: borderGlow 6s linear infinite;
    }

    @keyframes borderGlow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* Inner top light reflection */
    .glass-card::after {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    }

    /* ==================== TITLE ==================== */
    .title-section {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeSlideDown 0.8s ease-out 0.2s both;
    }

    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .title-main {
      font-size: 3.5rem;
      font-weight: 900;
      line-height: 1.1;
      background: linear-gradient(135deg, #f97316 0%, #ec4899 40%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 10px rgba(249, 115, 22, 0.3));
      margin-bottom: 0.6rem;
      font-style: italic;
    }

    .title-sub {
      font-size: 0.95rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 1px;
    }

    /* ==================== FORM ELEMENTS ==================== */
    .form-section {
      animation: fadeSlideUp 0.8s ease-out 0.4s both;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .glass-input {
      width: 100%;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      color: white;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 3px;
      outline: none;
      transition: all 0.3s ease;
      margin-bottom: 1rem;
    }

    .glass-input::placeholder {
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .glass-input:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(139, 92, 246, 0.5);
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.15), inset 0 0 20px rgba(139, 92, 246, 0.05);
    }

    /* Primary button - white glass */
    .btn-join {
      width: 100%;
      padding: 16px;
      background: rgba(255, 255, 255, 0.95);
      color: #1a0533;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-join::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 0%, rgba(139, 92, 246, 0.1) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform 0.6s ease;
    }

    .btn-join:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255, 255, 255, 0.2);
    }

    .btn-join:hover::before {
      transform: translateX(100%);
    }

    .btn-join:active {
      transform: translateY(0);
      box-shadow: 0 2px 10px rgba(255, 255, 255, 0.1);
    }

    /* ==================== DIVIDER ==================== */
    .divider {
      display: flex;
      align-items: center;
      margin: 2rem 0;
      gap: 16px;
      animation: fadeSlideUp 0.8s ease-out 0.6s both;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    }

    .divider-text {
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.35);
      white-space: nowrap;
    }

    /* ==================== ADMIN SECTION ==================== */
    .admin-section {
      animation: fadeSlideUp 0.8s ease-out 0.8s both;
    }

    .btn-admin {
      width: 100%;
      padding: 14px;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: block;
      text-align: center;
    }

    .btn-admin:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(139, 92, 246, 0.4);
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.1);
      transform: translateY(-1px);
    }

    /* ==================== BOTTOM LINKS ==================== */
    .bottom-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 1.5rem;
      animation: fadeSlideUp 0.8s ease-out 1s both;
    }

    .bottom-link {
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.3);
      text-decoration: none;
      transition: all 0.2s;
    }

    .bottom-link:hover {
      color: rgba(255, 255, 255, 0.7);
    }

    /* ==================== LOGIN OVERLAY ==================== */
    .login-overlay-premium {
      position: fixed;
      inset: 0;
      display: none; /* Hidden by default */
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 26, 0.98);
      z-index: 9999;
      overflow: hidden;
    }

    .login-bg-decoration {
      position: absolute;
      width: 150%; height: 150%;
      background: radial-gradient(circle at 70% 20%, rgba(139, 92, 246, 0.1) 0%, transparent 40%),
                  radial-gradient(circle at 20% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 40%);
      animation: bgPulse 10s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      from { transform: scale(1); }
      to { transform: scale(1.1) rotate(5deg); }
    }

    .login-glass-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 28px;
      padding: 3rem 2.5rem;
      position: relative;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-icon-box {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(59, 130, 246, 0.15));
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 1.8rem;
      font-weight: 900;
      color: white;
      box-shadow: 0 0 30px rgba(139, 92, 246, 0.2);
    }

    .login-title-premium {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 900;
      color: white;
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
    }

    .login-sub-premium {
      text-align: center;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 2.5rem;
      font-weight: 600;
    }

    .login-field {
      margin-bottom: 1.25rem;
    }

    .login-field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 0.6rem;
      margin-left: 0.5rem;
    }

    .login-input-glass {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: white;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s;
      outline: none;
      text-align: left;
      letter-spacing: normal;
      text-transform: none;
    }

    .login-input-glass:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(139, 92, 246, 0.5);
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.1);
    }

    .btn-login-premium {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 1rem;
      box-shadow: 0 10px 20px -5px rgba(124, 58, 237, 0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-login-premium:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -5px rgba(124, 58, 237, 0.5);
      filter: brightness(1.1);
    }

    .login-err-premium {
      text-align: center;
      color: #fb7185;
      font-size: 0.85rem;
      font-weight: 700;
      margin-top: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-scene">
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="light-sweep"></div>
    <div class="light-sweep"></div>
    <div class="particles" id="particles"></div>
  </div>

  <!-- Main Content -->
  <div class="main-container">
    <div class="glass-card">
      <!-- Title -->
      <div class="title-section">
        <div class="title-main">Quiz<br>Game!</div>
        <div class="title-sub">Chương trình Thi đấu Kiến thức</div>
      </div>

      <!-- Player Join -->
      <div class="form-section">
        <input type="text" id="roomCodeInput" class="glass-input" placeholder="Mã phòng" maxlength="10" autocomplete="off">
        <button class="btn-join" onclick="goPlayer()">Tham gia ngay</button>
      </div>

      <!-- Divider -->
      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">Dành cho ban tổ chức</div>
        <div class="divider-line"></div>
      </div>

      <!-- Admin Section -->
      <div class="admin-section">
        <button onclick="showAdminLogin()" class="btn-admin">Đăng nhập Admin</button>
      </div>

      <!-- Bottom Links -->
      <div class="bottom-links" style="display:none;">
        <a href="/puzzle" class="bottom-link">Xếp hình</a>
        <a href="/setup" class="bottom-link">Cài đặt</a>
      </div>
    </div>
  </div>

  <!-- Admin Login Overlay -->
  <div id="adminLoginOverlay" class="login-overlay-premium">
    <div class="login-bg-decoration"></div>
    <div class="login-glass-card">
      <div class="login-icon-box">QZ</div>
      <h2 class="login-title-premium">Bật Chế Độ Admin</h2>
      <p class="login-sub-premium">Nhập thông tin xác thực để vào cài đặt</p>
      
      <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
        <div class="login-field">
          <label>Tài khoản</label>
          <input type="text" id="adminUser" class="login-input-glass" required placeholder="admin" autocomplete="username">
        </div>
        <div class="login-field">
          <label>Mật khẩu</label>
          <input type="password" id="adminPass" class="login-input-glass" required placeholder="••••••••" autocomplete="current-password">
        </div>
        
        <div id="adminLoginError" class="login-err-premium">Sai tài khoản hoặc mật khẩu</div>
        
        <div style="display:flex; gap:12px; margin-top:2rem;">
          <button type="button" onclick="hideAdminLogin()" class="btn-admin" style="margin-top:0; flex:1">Hủy</button>
          <button type="submit" class="btn-login-premium" style="margin-top:0; flex:2">Đăng nhập</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Generate floating particles
    const particlesContainer = document.getElementById('particles');
    if (particlesContainer) {
      for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (8 + Math.random() * 15) + 's';
        p.style.animationDelay = -(Math.random() * 20) + 's';
        p.style.width = p.style.height = (1 + Math.random() * 3) + 'px';
        p.style.opacity = 0.2 + Math.random() * 0.4;
        particlesContainer.appendChild(p);
      }
    }

    // Navigate to player page with room code
    function goPlayer() {
      const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
      if (code) {
        window.location.href = `/player?room=${code}`;
      } else {
        window.location.href = '/player';
      }
    }

    // Enter key support
    const roomInput = document.getElementById('roomCodeInput');
    if (roomInput) {
      roomInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') goPlayer();
      });
    }

    // Admin Login functions
    function showAdminLogin() {
      document.getElementById('adminLoginOverlay').style.display = 'flex';
      document.getElementById('adminPass').focus();
    }

    function hideAdminLogin() {
      document.getElementById('adminLoginOverlay').style.display = 'none';
      document.getElementById('adminLoginError').style.display = 'none';
    }

    async function handleAdminLogin(e) {
      e.preventDefault();
      const user = document.getElementById('adminUser').value;
      const password = document.getElementById('adminPass').value;
      const errorEl = document.getElementById('adminLoginError');

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user, password })
        });
        const data = await res.json();
        if (data.success && data.token) {
          // Store in sessionStorage (expires when tab closes)
          sessionStorage.setItem('adminToken', data.token);
          window.location.href = '/setup';
        } else {
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.style.display = 'block';
        errorEl.textContent = 'Lỗi kết nối máy chủ';
      }
    }
  </script>
</body>
</html>
